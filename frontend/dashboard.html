<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FaceAI — Surveillance Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg: #09090f;
            --surface: #0f0f1a;
            --card: #13131f;
            --border: #1e1e30;
            --accent: #00e5ff;
            --warn: #ff3b5c;
            --ok: #00ff88;
            --muted: #4a4a6a;
            --text: #e8e8f4;
            --subtext: #7070a0;
            --mono: 'Space Mono', monospace;
            --sans: 'DM Sans', sans-serif;
            --radius: 10px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 229, 255, 0.012) 2px,
                    rgba(0, 229, 255, 0.012) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* ── Layout ── */
        .shell {
            display: grid;
            grid-template-rows: 52px 1fr;
            grid-template-columns: 1fr;
            min-height: 100vh;
        }

        /* ── Top bar ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ok);
            box-shadow: 0 0 8px var(--ok);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .header-meta {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--subtext);
            display: flex;
            gap: 24px;
            align-items: center;
        }

        #clock {
            color: var(--accent);
        }

        /* ── Main content ── */
        main {
            display: grid;
            grid-template-columns: 1fr 340px;
            grid-template-rows: auto auto 1fr;
            gap: 16px;
            padding: 16px;
            align-items: start;
        }

        /* ── Section label ── */
        .label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.16em;
            color: var(--subtext);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* ── Live feed ── */
        .feed-section {
            grid-column: 1;
            grid-row: 1 / 3;
        }

        .feed-wrapper {
            position: relative;
            background: #000;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .feed-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 560px;
            object-fit: cover;
        }

        /* Corner brackets */
        .feed-wrapper::before,
        .feed-wrapper::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .feed-wrapper::before {
            top: 8px;
            left: 8px;
            border-top: 2px solid var(--accent);
            border-left: 2px solid var(--accent);
        }

        .feed-wrapper::after {
            bottom: 8px;
            right: 8px;
            border-bottom: 2px solid var(--accent);
            border-right: 2px solid var(--accent);
        }

        .feed-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 59, 92, 0.85);
            color: #fff;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 3px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .feed-badge span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff;
            animation: pulse 1s infinite;
        }

        /* ── Stats row ── */
        .stats-section {
            grid-column: 1;
            grid-row: 3;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-val {
            font-family: var(--mono);
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
            color: var(--accent);
        }

        .stat-val.warn {
            color: var(--warn);
        }

        .stat-val.ok {
            color: var(--ok);
        }

        .stat-desc {
            font-size: 12px;
            color: var(--subtext);
        }

        /* ── Right column ── */
        .right-col {
            grid-column: 2;
            grid-row: 1 / 4;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Cards ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
        }

        /* ── Unknown gallery ── */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .gallery-item:hover {
            border-color: var(--warn);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-item .ts {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            font-family: var(--mono);
            font-size: 9px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--warn);
            padding: 2px 4px;
            text-align: center;
        }

        .gallery-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 20px;
            color: var(--muted);
            font-size: 12px;
        }

        /* ── Add known face ── */
        .add-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--sans);
            font-size: 13px;
            padding: 8px 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        input[type="text"]::placeholder {
            color: var(--muted);
        }

        button {
            background: var(--accent);
            color: #000;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            white-space: nowrap;
        }

        button:hover {
            opacity: 0.85;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Progress bar */
        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            width: 0%;
            transition: width 0.2s;
        }

        .status-msg {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--subtext);
            min-height: 16px;
        }

        /* ── Event log ── */
        .event-log {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 260px;
            overflow-y: auto;
        }

        .event-log::-webkit-scrollbar {
            width: 4px;
        }

        .event-log::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .event-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 6px 8px;
            border-radius: 6px;
            background: var(--surface);
            font-size: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .event-name {
            font-weight: 500;
            color: var(--text);
        }

        .event-time {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--subtext);
        }

        .event-type {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
        }

        .event-type.entry {
            color: var(--ok);
        }

        .event-type.unknown {
            color: var(--warn);
        }

        .empty-state {
            text-align: center;
            padding: 16px;
            color: var(--muted);
            font-size: 12px;
        }

        /* ── Camera preview ── */
        video {
            display: none;
        }
    </style>
</head>

<body>

    <div class="shell">

        <!-- ── Header ── -->
        <header>
            <div class="logo">
                <div class="logo-dot"></div>
                FACE·AI
            </div>
            <div class="header-meta">
                <span>MODEL: FACENET512</span>
                <span>DEVICE: <span id="hostname">LOCAL</span></span>
                <span id="clock">--:--:--</span>
            </div>
        </header>

        <!-- ── Main ── -->
        <main>

            <!-- ── Live feed ── -->
            <div class="feed-section">
                <div class="label">Live Feed — Camera 01</div>
                <div class="feed-wrapper">
                    <img id="stream" src="/video" alt="Live feed" />
                    <div class="feed-badge"><span></span> REC</div>
                </div>
            </div>

            <!-- ── Stats ── -->
            <div class="stats-section">
                <div class="label">Session Stats</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-val ok" id="stat-known">—</div>
                        <div class="stat-desc">Known People</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-val warn" id="stat-unknown">—</div>
                        <div class="stat-desc">Unknown Captures</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-val" id="stat-events">—</div>
                        <div class="stat-desc">Total Events</div>
                    </div>
                </div>
            </div>

            <!-- ── Right column ── -->
            <div class="right-col">

                <!-- Unknown faces gallery -->
                <div class="card">
                    <div class="label">Recent Unknown Faces</div>
                    <div class="gallery" id="gallery">
                        <div class="gallery-empty">No unknown faces yet</div>
                    </div>
                </div>

                <!-- Add known face -->
                <div class="card">
                    <div class="label">Register Face</div>
                    <div class="add-form">
                        <div class="input-row">
                            <input type="text" id="personName" placeholder="Full name…" />
                            <button id="captureBtn" onclick="captureFace()">CAPTURE</button>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress"></div>
                        </div>
                        <div class="status-msg" id="statusMsg">Ready — will capture 40 frames</div>
                    </div>
                </div>

                <!-- Event log -->
                <div class="card" style="flex:1;">
                    <div class="label">Event Log</div>
                    <div class="event-log" id="eventLog">
                        <div class="empty-state">No events yet</div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Camera for capture -->
    <video id="camPreview" autoplay playsinline></video>

    <script>
        // ── Clock ──
        function tick() {
            const now = new Date();
            document.getElementById('clock').textContent =
                now.toTimeString().slice(0, 8);
        }
        tick();
        setInterval(tick, 1000);

        // ── Camera for face registration ──
        const video = document.getElementById('camPreview');
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(s => { video.srcObject = s; })
            .catch(e => console.warn('Camera access:', e));

        // ── Stats ──
        async function loadStats() {
            try {
                const [people, unknown, events] = await Promise.all([
                    fetch('/api/known_people').then(r => r.json()),
                    fetch('/api/unknown_faces').then(r => r.json()),
                    fetch('/api/events').then(r => r.json()),
                ]);
                document.getElementById('stat-known').textContent = people.length;
                document.getElementById('stat-unknown').textContent = unknown.length;
                document.getElementById('stat-events').textContent = events.length;
            } catch (e) { }
        }

        // ── Unknown faces gallery ──
        async function loadGallery() {
            try {
                const files = await fetch('/api/unknown_faces').then(r => r.json());
                const box = document.getElementById('gallery');
                if (!files.length) {
                    box.innerHTML = '<div class="gallery-empty">No unknown faces captured</div>';
                    return;
                }
                box.innerHTML = files.map(f => {
                    const ts = f.split('.')[0];
                    const d = ts.length > 10
                        ? new Date(parseInt(ts)).toLocaleTimeString()
                        : new Date(parseInt(ts) * 1000).toLocaleTimeString();
                    return `
          <div class="gallery-item">
            <img src="/data/unknown_faces/${f}" loading="lazy" />
            <div class="ts">${d}</div>
          </div>`;
                }).join('');
            } catch (e) { }
        }

        // ── Event log ──
        async function loadEvents() {
            try {
                const events = await fetch('/api/events').then(r => r.json());
                const box = document.getElementById('eventLog');
                if (!events.length) {
                    box.innerHTML = '<div class="empty-state">No events logged yet</div>';
                    return;
                }
                box.innerHTML = events.slice(0, 30).map(e => {
                    const isUnknown = e.name === 'Unknown';
                    const dotColor = isUnknown ? 'var(--warn)' : 'var(--ok)';
                    const typeClass = isUnknown ? 'unknown' : 'entry';
                    const timeStr = e.time ? new Date(e.time.slice(0, 23)).toLocaleTimeString() : '—';
                    return `
          <div class="event-row">
            <div class="event-dot" style="background:${dotColor}"></div>
            <div class="event-name">${e.name}</div>
            <div>
              <div class="event-type ${typeClass}">${e.event}</div>
              <div class="event-time">${timeStr}</div>
            </div>
          </div>`;
                }).join('');
            } catch (e) { }
        }

        // ── Capture & register face ──
        async function captureFace() {
            const name = document.getElementById('personName').value.trim();
            if (!name) { alert('Enter a name first.'); return; }

            const btn = document.getElementById('captureBtn');
            const progress = document.getElementById('progress');
            const status = document.getElementById('statusMsg');

            btn.disabled = true;
            const FRAMES = 40;
            const images = [];

            for (let i = 0; i < FRAMES; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9));
                images.push(blob);
                const pct = Math.round(((i + 1) / FRAMES) * 100);
                progress.style.width = pct + '%';
                status.textContent = `Capturing… ${i + 1}/${FRAMES}`;
                await new Promise(r => setTimeout(r, 120));
            }

            status.textContent = 'Uploading & building index…';

            const form = new FormData();
            form.append('name', name);
            images.forEach(img => form.append('images', img, 'face.jpg'));

            try {
                const res = await fetch('/api/add-known-face', { method: 'POST', body: form });
                const data = await res.json();
                status.textContent = `✔ Saved ${data.saved} frames for "${data.person}"`;
                document.getElementById('personName').value = '';
                progress.style.width = '0%';
                loadStats();
            } catch (e) {
                status.textContent = '✗ Upload failed — check backend.';
            }

            btn.disabled = false;
        }

        // ── Polling ──
        function refresh() {
            loadGallery();
            loadEvents();
            loadStats();
        }

        refresh();
        setInterval(refresh, 4000);
    </script>
</body>

</html>
